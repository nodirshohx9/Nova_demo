<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova — Administrator paneli</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --space-1: #05060F; --space-2: #0A0E1F; --space-3: #10152B;
    --panel: rgba(18,22,44,0.55); --panel-solid: #10142A;
    --border: rgba(120,150,255,0.18); --border-soft: rgba(255,255,255,0.08);
    --blue: #3DA9FC; --blue-soft: rgba(61,169,252,0.16);
    --gold: #FFC93C; --gold-soft: rgba(255,201,60,0.16);
    --text: #EDF1FF; --text-dim: #8C93B8; --radius: 16px;
    --font-display: 'Sora', sans-serif; --font-body: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{
    background: radial-gradient(ellipse at 15% 0%, rgba(61,169,252,0.10), transparent 45%),
                radial-gradient(ellipse at 85% 15%, rgba(255,201,60,0.08), transparent 40%),
                linear-gradient(180deg, var(--space-1), var(--space-2) 40%, var(--space-1));
    color: var(--text); font-family: var(--font-body); min-height: 100vh; position: relative; overflow-x: hidden;
  }
  .stars{ position: fixed; inset:0; z-index:0; pointer-events:none; }
  .stars span{ position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; opacity:.5; animation: twinkle 4s ease-in-out infinite; }
  @keyframes twinkle{ 0%,100%{ opacity:.15; } 50%{ opacity:.9; } }
  .floaters{ position: fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .floater{ position:absolute; opacity:.14; animation: drift linear infinite; }
  @keyframes drift{ 0%{ transform: translate(0,0) rotate(0deg); } 50%{ transform: translate(18px,-26px) rotate(180deg); } 100%{ transform: translate(0,0) rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .floater{ animation:none; } .stars span{ animation:none; opacity:.4; } }

  .app{ position: relative; z-index: 2; max-width: 560px; margin: 0 auto; padding: 60px 24px 80px; }

  .brand{ text-align:center; margin-bottom: 40px; }
  .brand img{ height: 64px; width:auto; filter: drop-shadow(0 0 14px rgba(61,169,252,0.4)); margin-bottom: 14px; }
  .brand .word{ font-family: var(--font-display); font-weight:800; font-size:30px; letter-spacing:.03em; }
  .brand .tag{
    display:inline-block; margin-top:10px; font-family: var(--font-mono); font-size:11.5px; letter-spacing:.08em;
    text-transform:uppercase; color: var(--gold); border: 1px solid rgba(255,201,60,0.35); background: var(--gold-soft);
    padding: 4px 12px; border-radius:999px;
  }

  .glass-card{ background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); backdrop-filter: blur(14px); padding: 28px; }

  .field{ margin-bottom:16px; }
  label{ display:block; font-size:12px; font-weight:700; color: var(--text-dim); text-transform:uppercase; letter-spacing:.06em; margin-bottom:8px; }
  textarea, input[type=text]{
    width:100%; background: rgba(5,7,18,0.55); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-family: var(--font-mono); font-size:14.5px; padding: 14px 16px; resize: vertical;
  }
  textarea:focus, input:focus{ outline: 2px solid var(--blue); outline-offset:1px; }
  textarea{ min-height: 140px; }

  .row{ display:flex; gap:16px; flex-wrap:wrap; }
  .row > .field{ flex:1 1 200px; }

  button.glow-btn{
    background: linear-gradient(120deg, var(--blue), #6FC3FF); color: var(--space-1); border:none;
    font-family: var(--font-body); font-weight:800; font-size:14.5px; padding: 13px 26px; border-radius: 999px;
    cursor:pointer; transition: transform .12s ease, box-shadow .12s ease; box-shadow: 0 0 22px rgba(61,169,252,0.3); width:100%;
  }
  button.glow-btn:hover{ transform: translateY(-1px); box-shadow: 0 0 28px rgba(61,169,252,0.5); }
  button.glow-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

  .status{ font-family: var(--font-mono); font-size:12.5px; color: var(--blue); margin-top:12px; min-height:16px; }
  .status.err{ color: #FF8080; }

  .lock-icon{ font-size:34px; text-align:center; margin-bottom:14px; }

  #admin-content-wrap{ display:none; margin-top: 26px; }

  .book-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(190px,1fr)); gap:14px; margin-top: 18px; }
  .book-card{ background: rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:14px; }
  .book-card .b-title{ font-family: var(--font-display); font-size:18px; margin:0 0 4px; }
  .book-card .b-author{ font-size:11.5px; color: var(--text-dim); font-family: var(--font-mono); }
  .book-card .b-count{ font-size:11px; color: var(--blue); margin-top:6px; font-family: var(--font-mono); }
  .book-card .b-del{ margin-top:10px; background:none; border:1px solid var(--border); color:#FF8A8A; font-size:11px; padding:4px 8px; border-radius:999px; cursor:pointer; font-weight:600; }
  .empty-note{ color: var(--text-dim); font-size:13px; font-family: var(--font-mono); padding:8px 0; }

 .sec-title{ font-family: var(--font-display); font-weight:700; font-size:20px; margin:0 0 4px; display:flex; align-items:center; gap:8px; }
  .sec-title .icon{ color: var(--gold); font-size:18px; }
  .field-hint{ font-size:11.5px; color: var(--text-dim); font-family: var(--font-mono); margin-top:6px; text-align:right; }
  .empty-state{
    text-align:center; padding: 32px 16px; border: 1.5px dashed var(--border); border-radius:12px; color: var(--text-dim);
  }
  .empty-state .e-icon{ font-size:26px; margin-bottom:8px; opacity:.7; }
  .empty-state .e-text{ font-size:13px; font-family: var(--font-mono); }
  .success-flash{ color: #8FE0A0 !important; }

  .back-home{ display:block; text-align:center; margin-top:28px; color: var(--text-dim); font-family: var(--font-mono); font-size:12.5px; text-decoration:none; }
  .back-home:hover{ color: var(--blue); }
</style>
</head>

    <div class="word">NOVA</div>
    <div class="tag">Administrator paneli</div>
  </div>

  <div class="glass-card" id="admin-gate">
    <div class="lock-icon">🔒</div>
    <div class="field">
      <label for="admin-pass">Administrator kodi</label>
      <input type="text" id="admin-pass" placeholder="Kodni kiriting" autocomplete="off">
    </div>
    <button class="glow-btn" id="admin-unlock-btn">Kirish</button>
    <div class="status" id="admin-gate-status"></div>
  </div>

  <div id="admin-content-wrap">
    <div class="glass-card">
     <h2 class="sec-title"><span class="icon">📘</span>Yangi kitob qo'shish</h2>
      <p class="status" style="color:var(--text-dim); margin-bottom:18px;">Har bir misol yoki masalani alohida qatorga yozing.</p>

      <div class="row">
        <div class="field">
          <label for="admin-title">Kitob nomi</label>
          <input type="text" id="admin-title" placeholder="Masalan: Algebra 8-sinf">
        </div>
        <div class="field">
          <label for="admin-author">Muallif (ixtiyoriy)</label>
          <input type="text" id="admin-author" placeholder="Masalan: A. Abdullayev">
        </div>
      </div>
      <div class="field">
        <label for="admin-pdf">Kitob fayli (PDF)</label>
        <input type="file" id="admin-pdf" accept="application/pdf" style="width:100%; background: rgba(5,7,18,0.55); border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:var(--font-mono); font-size:13px; padding:14px 16px;">
        <div class="field-hint" id="pdf-filename"></div>
      </div>
      <button class="glow-btn" id="admin-add-btn">Kitobni qo'shish</button>
      <div class="status" id="admin-status"></div>

      <div style="margin-top:26px; padding-top:20px; border-top:1px dashed var(--border-soft);">
        <h2 class="sec-title"><span class="icon">📚</span>Mavjud kitoblar</h2>
        <div id="admin-book-list" class="book-grid"></div>
      </div>
    </div>
  </div>

  <a href="/" class="back-home">&larr; Nova asosiy sahifasiga qaytish</a>
</div>

<script>
// ---------- Starfield ----------
const starsEl = document.getElementById('stars');
for(let i=0;i<60;i++){
  const s = document.createElement('span');
  s.style.left = Math.random()*100 + '%';
  s.style.top = Math.random()*100 + '%';
  s.style.animationDelay = (Math.random()*4) + 's';
  const size = (Math.random()*1.6 + 1).toFixed(1);
  s.style.width = size + 'px'; s.style.height = size + 'px';
  starsEl.appendChild(s);
}
const shapes = [
  `<svg width="42" height="42" viewBox="0 0 46 46"><circle cx="23" cy="23" r="18" stroke="#3DA9FC" stroke-width="1.6" fill="none"/></svg>`,
  `<svg width="42" height="42" viewBox="0 0 46 46"><polygon points="23,4 42,40 4,40" stroke="#FFC93C" stroke-width="1.6" fill="none"/></svg>`,
  `<svg width="50" height="30" viewBox="0 0 52 34"><text x="0" y="26" font-family="Sora" font-size="24" fill="#3DA9FC">&#8721;</text></svg>`,
  `<svg width="50" height="30" viewBox="0 0 60 34"><text x="0" y="26" font-family="Sora" font-size="22" fill="#FFC93C">&#8730;x</text></svg>`
];
const floatersEl = document.getElementById('floaters');
const positions = [[6,10],[88,8],[10,75],[85,65],[45,4],[70,88]];
positions.forEach((pos, i)=>{
  const wrap = document.createElement('div');
  wrap.className = 'floater';
  wrap.style.left = pos[0] + '%'; wrap.style.top = pos[1] + '%';
  wrap.style.animationDuration = (14 + Math.random()*10).toFixed(1) + 's';
  wrap.style.animationDelay = (Math.random()*-10).toFixed(1) + 's';
  wrap.innerHTML = shapes[i % shapes.length];
  floatersEl.appendChild(wrap);
});

function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

document.getElementById('admin-pdf').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  document.getElementById('pdf-filename').textContent = file ? file.name : '';
});

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=> resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ---------- Admin password gate (server-side check) ----------
document.getElementById('admin-unlock-btn').addEventListener('click', async ()=>{
  const val = document.getElementById('admin-pass').value.trim();
  const statusEl = document.getElementById('admin-gate-status');
  const btn = document.getElementById('admin-unlock-btn');
  btn.disabled = true;
  statusEl.classList.remove('err');
  statusEl.textContent = "Tekshirilmoqda...";
  try{
    const res = await fetch('/api/admin-auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: val })
    });
    const data = await res.json();
    if(data.ok){
      document.getElementById('admin-gate').style.display = 'none';
      document.getElementById('admin-content-wrap').style.display = 'block';
      statusEl.textContent = '';
      refreshBookList();
    }else{
      statusEl.textContent = "Kod noto'g'ri.";
      statusEl.classList.add('err');
    }
  }catch(err){
    statusEl.textContent = "Xatolik: " + err.message;
    statusEl.classList.add('err');
  }finally{
    btn.disabled = false;
  }
});
document.getElementById('admin-pass').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ document.getElementById('admin-unlock-btn').click(); }
});

// ---------- Books (shared storage) ----------
async function loadBooks(){
  try{
    const res = await fetch('/api/books');
    const data = await res.json();
    return data.books || [];
  }catch(e){ return []; }
}

function renderBookGrid(containerEl, books){
  containerEl.innerHTML = '';
  if(books.length === 0){
    containerEl.innerHTML = `
      <div class="empty-state">
        <div class="e-icon">📖</div>
        <div class="e-text">Hozircha kitoblar yo'q. Yuqoridagi formadan birinchi kitobingizni qo'shing.</div>
      </div>
    `;
    return;
  }
  books.forEach(b=>{
    const card = document.createElement('div');
    card.className = 'book-card';
   card.innerHTML = `
      <div class="b-title">${escapeHtml(b.title)}</div>
      ${b.author ? `<div class="b-author">${escapeHtml(b.author)}</div>` : ''}
      <div class="b-count">📄 PDF kitob</div>
    `;
    const delBtn = document.createElement('button');
    delBtn.className = 'b-del';
    delBtn.textContent = "O'chirish";
   delBtn.addEventListener('click', async ()=>{
      delBtn.disabled = true;
      try{
        await fetch('/api/books', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: b.id })
        });
        await refreshBookList();
      }catch(err){ alert("O'chirishda xatolik: " + err.message); delBtn.disabled = false; }
    });
    card.appendChild(delBtn);
    containerEl.appendChild(card);
  });
}

async function refreshBookList(){
  const books = await loadBooks();
  renderBookGrid(document.getElementById('admin-book-list'), books);
}

document.getElementById('admin-add-btn').addEventListener('click', async ()=>{
  const title = document.getElementById('admin-title').value.trim();
  const author = document.getElementById('admin-author').value.trim();
  const file = document.getElementById('admin-pdf').files[0];
  const statusEl = document.getElementById('admin-status');
  const btn = document.getElementById('admin-add-btn');
  if(!title || !file){ statusEl.textContent = "Kitob nomi va PDF faylni tanlang."; statusEl.classList.add('err'); return; }
  statusEl.classList.remove('err');
  statusEl.textContent = "Fayl yuklanmoqda...";
  btn.disabled = true;
  try{
    const fileBase64 = await fileToBase64(file);
    const uploadRes = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: file.name, fileBase64 })
    });
    const uploadData = await uploadRes.json();
    if(!uploadRes.ok) throw new Error(uploadData.error || "Fayl yuklashda xatolik");

    statusEl.textContent = "Saqlanmoqda...";
    const res = await fetch('/api/books', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, author, fileUrl: uploadData.url })
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Saqlash muvaffaqiyatsiz tugadi");

    document.getElementById('admin-title').value = '';
    document.getElementById('admin-author').value = '';
    document.getElementById('admin-pdf').value = '';
    document.getElementById('pdf-filename').textContent = '';
    statusEl.textContent = "✓ Kitob qo'shildi.";
    statusEl.classList.add('success-flash');
    await refreshBookList();
    setTimeout(()=>{ statusEl.classList.remove('success-flash'); statusEl.textContent=''; }, 3000);
  }catch(err){ statusEl.textContent = "Xatolik: " + err.message; statusEl.classList.add('err'); }
  finally{ btn.disabled = false; }
});
</script>
